<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WkKit —— WkHouse's plugin</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- compressed -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="shortcut icon" href="favicon.ico" />


</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'WkKit',
      repo: 'https://github.com/WekyJay/WkKit_WiKi',
      coverpage: true,
      loadSidebar: true,
      subMaxLevel: 3,
      relativePath: true, // 使用相对路径
      search: 'auto',
      // 多语言侧边栏配置
      alias: {
        // 确保每个语言目录使用自己的侧边栏
        '/zh_CN/(.*)/_sidebar.md': '/zh_CN/_sidebar.md',
        '/en_US/(.*)/_sidebar.md': '/en_US/_sidebar.md',
        '/zh_CN/_sidebar.md': '/zh_CN/_sidebar.md',
        '/en_US/_sidebar.md': '/en_US/_sidebar.md',
        // 默认侧边栏
        '/_sidebar.md': '/zh_CN/_sidebar.md'
      },
      // complete configuration parameters
      search: {
        maxAge: 86400000, // Expiration time, the default one day
        paths: 'auto', // or 'auto'
        placeholder: 'Type to search',

        // Localization
        placeholder: {
          '/zh_CN/': '搜索',
          '/en/': 'Type to search',
          '/': 'Type to search',
        },

        noData: 'No Results!',

        // Localization
        noData: {
          '/zh_CN/': '找不到结果',
          '/en/': 'No Results',
          '/': 'No Results',
        },

      },
      progress: {
        position: "top",
        color: "var(--theme-color,#42b983)",
        height: "3px",
      },
      // 添加字数统计
      count: {
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90,90,90)',
        language: 'chinese'
      },
      // 添加图片缩放
      zoom: {
        maxWidth: 800,
        maxHeight: 600
      },
      // 添加代码行号
      lineNumbers: true,
    }
  </script>
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- search -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Language highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <!-- click to copy -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <!-- docsify-progress -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-progress@latest/dist/progress.min.js"></script>
  <!-- 字数统计插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-count@latest/dist/countable.min.js"></script>
  <!-- 图片缩放插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-image-caption@latest/dist/docsify-plugin-image-caption.min.js"></script>
  <!-- 代码行号插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-line-numbers@latest/dist/docsify-line-numbers.min.js"></script>
  <!-- 代码高亮扩展 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
